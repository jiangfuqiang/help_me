<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BatchMark - 技术支持与隐私政策</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        .logo {
            width: 120px;
            height: 120px;
            background: white;
            border-radius: 24px;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 {
            color: white;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }
        .tagline {
            color: rgba(255,255,255,0.9);
            font-size: 1.2em;
            margin-bottom: 40px;
        }
        .cards {
            display: grid;
            gap: 20px;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            text-decoration: none;
            color: inherit;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }
        .card-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        .card h2 {
            color: #667eea;
            font-size: 1.5em;
            margin-bottom: 10px;
        }
        .card p {
            color: #666;
        }
        .card:nth-child(2) h2 {
            color: #11998e;
        }
        .footer {
            margin-top: 40px;
            color: rgba(255,255,255,0.8);
        }
        .footer a {
            color: white;
        }
        @media (max-width: 500px) {
            h1 {
                font-size: 1.8em;
            }
            .card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🖼️</div>
        <h1>BatchMark</h1>
        <p class="tagline">专业的 macOS 批量图片水印与打码工具</p>
        
        <div class="cards">
            <a href="support.html" class="card">
                <div class="card-icon">🛠️</div>
                <h2>技术支持</h2>
                <p>获取使用帮助、常见问题解答和联系我们的方式</p>
            </a>
            
            <a href="privacy.html" class="card">
                <div class="card-icon">🔒</div>
                <h2>隐私政策</h2>
                <p>了解我们如何保护您的隐私和数据安全</p>
            </a>
        </div>
        
        <div class="footer">
            <p>技术支持邮箱: <a href="mailto:fc_help@163.com">fc_help@163.com</a></p>
            <p style="margin-top: 10px;">© 2026 BatchMark</p>
        </div>
    </div>
</body>
</html>
